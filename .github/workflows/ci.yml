name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check (api)
        working-directory: ./apps/api
        run: npx tsc --noEmit

      - name: TypeScript type check (web)
        working-directory: ./apps/web
        run: npx next lint

      - name: Prisma validate
        working-directory: ./apps/api
        run: npx prisma validate

      - name: Build
        run: pnpm -r --filter=@weopc/api --filter=@weopc/web build
