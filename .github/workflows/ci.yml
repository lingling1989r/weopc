name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/weopc?schema=public

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @weopc/api exec prisma generate

      - name: TypeScript type check (api)
        run: pnpm --filter @weopc/api exec tsc --noEmit

      - name: TypeScript type check (web)
        run: pnpm --filter @weopc/web exec next lint

      - name: Prisma validate
        run: pnpm --filter @weopc/api exec prisma validate

      - name: Build
        run: pnpm -r --filter=@weopc/api --filter=@weopc/web build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='dist' -czf weopc-deploy.tar.gz .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: weopc-deploy.tar.gz
          target: /home/weopc

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            rm -rf /home/weopc/weopc-release
            mkdir -p /home/weopc/weopc /home/weopc/weopc-release
            tar -xzf /home/weopc/weopc-deploy.tar.gz -C /home/weopc/weopc-release
            RELEASE_DIR=/home/weopc/weopc-release
            if [ -d /home/weopc/weopc-release/weopc ]; then
              RELEASE_DIR=/home/weopc/weopc-release/weopc
            fi
            chmod +x "$RELEASE_DIR/deploy/deploy.sh"
            "$RELEASE_DIR/deploy/deploy.sh"
